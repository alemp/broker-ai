# Render Blueprint — test deployment (Neon Postgres + this repo).
# API: native Python on Render (no container). Local development stays on Docker Compose.
# Static sites are served from a global CDN and cannot set `region` in Blueprint.
#
# Setup: docs/DEPLOY-TEST.md
#
# After the first API deploy, set the static site’s VITE_API_BASE_URL to the API URL
# and set the API’s CORS_ORIGINS to the static site URL (comma-separated if several).

services:
  - type: web
    name: ai-copilot-api-test
    runtime: python
    region: sa-east-1
    rootDir: apps/api
    buildCommand: pip install --upgrade pip && pip install .
    startCommand: alembic upgrade head && uvicorn ai_copilot_api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: APP_ENV
        value: test
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: DEFAULT_ORGANIZATION_SLUG
        value: default
      - key: STORAGE_BACKEND
        value: local
      - key: LOCAL_STORAGE_PATH
        value: /tmp/ai-copilot-storage
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: ai-copilot-web-test
    runtime: static
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build:web
    staticPublishPath: apps/web/dist
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
