services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_copilot_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ai_copilot}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ai_copilot} -d ${POSTGRES_DB:-ai_copilot}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ai_copilot}:${POSTGRES_PASSWORD:-ai_copilot_dev}@postgres:5432/${POSTGRES_DB:-ai_copilot}
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-compose-change-me}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      DEFAULT_ORGANIZATION_SLUG: ${DEFAULT_ORGANIZATION_SLUG:-default}
      ADEQUACY_REFRESH_INTERVAL_MINUTES: ${ADEQUACY_REFRESH_INTERVAL_MINUTES:-0}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/data/objects}
      OCR_PROVIDER_URL: ${OCR_PROVIDER_URL:-http://ocr:9001/v1/ocr}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-por}
      OCR_MIN_TEXT_CHARS: ${OCR_MIN_TEXT_CHARS:-300}
    ports:
      - '${API_PORT:-8000}:8000'
    volumes:
      - api_objects:/data/objects
    depends_on:
      postgres:
        condition: service_healthy
      ocr:
        condition: service_started

  ocr:
    build:
      context: ./apps/ocr
    ports:
      - '${OCR_PORT:-9001}:9001'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - api

volumes:
  postgres_data:
  api_objects:
