services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_copilot_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ai_copilot}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ai_copilot} -d ${POSTGRES_DB:-ai_copilot}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ai_copilot}:${POSTGRES_PASSWORD:-ai_copilot_dev}@postgres:5432/${POSTGRES_DB:-ai_copilot}
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-compose-change-me}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      DEFAULT_ORGANIZATION_SLUG: ${DEFAULT_ORGANIZATION_SLUG:-default}
    ports:
      - '${API_PORT:-8000}:8000'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - api

volumes:
  postgres_data:
